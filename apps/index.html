<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animations</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
      font-family: sans-serif;
      min-height: 100vh;
    }
    h1 {
      color: #ddd;
      font-size: 1.8rem;
      font-weight: 300;
      margin: 0 0 40px;
      letter-spacing: 0.08em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }
    a.card {
      display: block;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s;
    }
    a.card:hover {
      border-color: #4a90d9;
      transform: translateY(-2px);
    }
    .card-title {
      color: #ddd;
      font-size: 1rem;
      font-weight: 500;
      margin: 0 0 8px;
    }
    .card-desc {
      color: #666;
      font-size: 0.85rem;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>Animations</h1>
  <div class="grid">
    <a class="card" href="rolling-wheel/rolling-wheel.html">
      <p class="card-title">Rolling Wheel</p>
      <p class="card-desc">A wheel rolls along a road. Watch the cycloid path traced by a point on its rim.</p>
    </a>
  </div>
</body>
</html>
